<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">

    <title>TechWave</title>

</head>
<body class="w-full max-w-[1272px] mx-auto">

    <header class="flex w-full h-12 bg-[#1A0B2E] justify-between  pt-1.5 pl-7 pr-7 ">

        <div class="flex ">

            <h2 class="text-white  font-bold text-3xl">Tech</h2>
            <h2 class="text-3xl font-bold
           bg-linear-to-r
           from-pink-500
           to-purple-500
           bg-clip-text
           text-transparent">Wave</h2>

        </div>

        <nav class="flex justify-evenly  ">
            <ul class="flex">
            <li class="list-none ml-5 mr-5" ><a class="decoration-none text-white" href="">About</a></li>
            <li class="list-none ml-5 mr-5" ><a class="decoration-none text-white" href="">Episodes</a></li>
            <li class="list-none ml-5 mr-5" ><a class="decoration-none text-white" href="">Host</a></li></ul>
        </nav>

        <button class="rounded-[17px] w-[115px] p-[5px]  h-[33px] text-white font-medium border-none bg-linear-to-tr
         from-[#F7E93F]
          via-[#FB09B4]
           to-[#9100F8] flex   gap-1">subscribe 
        <img class=" items-center justify-center  p-1" src="./assets/ArrowRight.png" alt="">
        </button>
    </header>
    <main class="w-full">
        <hr class="border-gray-500">

        <section class="relative  w-full  min-h-[550px] bg-cover bg-center bg-no-repeat"
        style="background-image: url('./assets/hero-bg.png')"><!--this type of style attribute is very important.this sets the image as a background  and you could not see any images if these clases are not defined properly-->

          <div class="absolute inset-0 flex items-center justify-center">
            
            
            <div class="relative -translate-y-[79px]">

                <img src="./assets/hero-circle.png" alt="circle"
                 class="w-68 h-65 ">

                 <img src="./assets/microphone.png" alt="mic"
                  class="absolute inset-0 m-auto ">
            </div>
            <div class=" absolute top-20 right-130 text-xs z-50 bg-[#03fa52] w-[45px] h-6 place-items-center rounded-lg pt-1 p-1.4">
                <h2 class="text-1xl text-gray-700">NEW</h2>
            </div>

          </div>


        </section>
    </main>
    <footer></footer>
</body>
</html>
